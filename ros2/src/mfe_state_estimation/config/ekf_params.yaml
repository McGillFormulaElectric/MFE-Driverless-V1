ekf_node:
  ros__parameters:
    # ------------------------------------------------------------------ #
    # Topic names — must match what EUFS sim publishes                    #
    #                                                                     #
    # GPS:  libgazebo_ros_gps_sensor.so remaps ~/out:=gps → /gps         #
    #       Message type: sensor_msgs/NavSatFix                          #
    #       Sim update rate: 5 Hz; noise stddev: 2 m horizontal          #
    #                                                                     #
    # IMU:  libgazebo_ros_imu_sensor.so remaps ~/out:=imu → /imu         #
    #       Message type: sensor_msgs/Imu                                #
    #       Sim update rate: 1000 Hz; angular noise stddev: 0.08 rad/s   #
    # ------------------------------------------------------------------ #
    imu_topic: "/imu"
    gps_topic: "/gps"

    # Expected message rates (Hz) — used to set the EKF predict timestep
    # and GPS update interval.  Match the URDF <update_rate> values.
    imu_frequency: 100    # EKF predict runs at IMU rate; 1000 Hz is very fast — 100 is practical
    gps_frequency: 5      # matches <update_rate>5</update_rate> in gps.urdf.xacro

    # ------------------------------------------------------------------ #
    # Noise / covariance parameters                                       #
    #                                                                     #
    # var_imu_acc: [x, y] process noise variance for linear acceleration #
    #              (m/s²)²  — set from IMU linear_acceleration noise     #
    #              stddev=0.08 → var ≈ 0.08² ≈ 0.0064; round up to 0.01 #
    #                                                                     #
    # var_imu_w:   scalar process noise variance for angular velocity     #
    #              (rad/s)²  — stddev=0.08 → var ≈ 0.0064; use 0.01     #
    #                                                                     #
    # var_gps:     [x, y] measurement noise variance for GPS position    #
    #              (m)²  — GPS horizontal stddev=2 m → var = 4.0        #
    # ------------------------------------------------------------------ #
    var_imu_acc: [0.01, 0.01]
    var_imu_w: 0.01
    var_gps: [4.0, 4.0]

    # EKF output topic — consumed by pure_pursuit and any localization consumers
    output_topic: "/ekf/output"
